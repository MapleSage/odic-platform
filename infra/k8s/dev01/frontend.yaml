apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-shell
  labels:
    app.kubernetes.io/name: atlas-shell
    app.kubernetes.io/part-of: odic-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-shell
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-shell
    spec:
      containers:
        - name: atlas-shell
          image: sageinfranewdev01.azurecr.io/odic/shell:v1
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-shell
  labels:
    app.kubernetes.io/name: atlas-shell
    app.kubernetes.io/part-of: odic-platform
spec:
  selector:
    app.kubernetes.io/name: atlas-shell
  ports:
    - name: http
      port: 80
      targetPort: http

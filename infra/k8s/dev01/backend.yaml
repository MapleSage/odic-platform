apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-backend
  labels:
    app.kubernetes.io/name: atlas-backend
    app.kubernetes.io/part-of: odic-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-backend
    spec:
      containers:
        - name: atlas-backend
          image: sageinfranewdev01.azurecr.io/odic/backend:v9
          env:
            - name: ENTRA_TENANT_ID
              value: "e9394f90-446d-41dd-8c8c-98ac08c5f090"
            - name: ENTRA_CLIENT_ID
              value: "30d2deb0-ee52-4949-a8f8-035e6053a812"
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: atlas-openai
                  key: endpoint
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-openai
                  key: api-key
            - name: AZURE_OPENAI_DEPLOYMENT
              valueFrom:
                secretKeyRef:
                  name: atlas-openai
                  key: deployment
            - name: AZURE_SEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: atlas-search
                  key: endpoint
            - name: AZURE_SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-search
                  key: api-key
            - name: AZURE_SEARCH_INDEX
              valueFrom:
                secretKeyRef:
                  name: atlas-search
                  key: index
            - name: AZURE_SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: smtp-host
            - name: AZURE_SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: smtp-port
            - name: AZURE_SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: smtp-user
            - name: AZURE_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: smtp-password
            - name: AZURE_SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: smtp-from
            - name: INFOBIP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: infobip-base-url
            - name: INFOBIP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: infobip-api-key
            - name: INFOBIP_WHATSAPP_SENDER
              valueFrom:
                secretKeyRef:
                  name: atlas-comms
                  key: infobip-whatsapp-sender
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-backend
  labels:
    app.kubernetes.io/name: atlas-backend
    app.kubernetes.io/part-of: odic-platform
spec:
  selector:
    app.kubernetes.io/name: atlas-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
